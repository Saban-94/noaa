name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # שומר קאש כדי לזרז את הבילד הבא

    - name: Install Dependencies
      run: npm ci # עדיף בסביבת CI/CD כדי להבטיח עקביות

    - name: Build with Webpack
      run: npx webpack

    # - name: Run Tests
    #   run: npm test # מומלץ להוריד מהערה אם יש טסטים מוגדרים
